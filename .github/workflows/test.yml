name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev/test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shuttle-cli:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Unit tests in container
        env:
          SHUTTLE_DOCKER_IMAGE: shuttle-cli:dev
          SHUTTLE_DOCKER_SKIP_BUILD: "1"
        run: ./scripts/test-unit.sh

  integration:
    name: Integration tests (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev/test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shuttle-cli:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Integration tests in container
        env:
          SHUTTLE_DOCKER_IMAGE: shuttle-cli:dev
          SHUTTLE_DOCKER_SKIP_BUILD: "1"
        run: ./scripts/test-integration.sh
